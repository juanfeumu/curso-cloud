spring.application.name=umufly-api

#### Base de datos
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=jdbc:oracle:thin:@hydra-prescan.atica.um.es:1526/ZEUSTEST
spring.datasource.username=
spring.datasource.password=

### Logs para ver si reconoce las tablas 
spring.jpa.hibernate.ddl-auto=validate
logging.level.org.hibernate.orm.boot=TRACE

### REST evitar que se ordenen los JSON alfabeticamente
spring.jackson.mapper.sort-properties-alphabetically=false

### URL servicios MuchoVuelo
umufly.vuelos.providers.muchovuelo.base-url=https://daastest.um.es
umufly.vuelos.providers.muchovuelo.base-path=/ords/zeus/formacion_ticarum/muchovuelo-api/rest/


jwt.secret=
jwt.expiration-ms=86400000

### Path donde se expone la documentacion
springdoc.api-docs.path=/api-docs
### Index por defecto
springdoc.swagger-ui.path=/swagger-ui/index.html
### Interfaz grafica habilitada
springdoc.swagger-ui.enabled=true